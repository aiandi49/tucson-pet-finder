<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Tucson Pet Finder — Free Lost & Found Pet Alerts</title>
<meta http-equiv="refresh" content="0; url=tucson-pet-finder.html">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#020810;color:#C8E8FF;font-family:'Rajdhani',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px}
.wrap{max-width:340px;width:100%}
.icon{font-size:3rem;margin-bottom:16px;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.logo{font-family:'Orbitron',sans-serif;font-size:1.1rem;font-weight:900;color:#00FFD4;text-shadow:0 0 20px rgba(0,255,212,0.4);margin-bottom:6px;letter-spacing:0.06em}
.sub{font-size:0.85rem;color:#4A6A88;margin-bottom:28px}
.links{display:flex;flex-direction:column;gap:12px}
a{display:block;padding:16px;border-radius:12px;text-decoration:none;font-family:'Orbitron',sans-serif;font-size:0.75rem;font-weight:700;letter-spacing:0.06em;transition:all 0.2s}
a:active{transform:scale(0.97)}
.dark{background:#00FFD4;color:#020810;box-shadow:0 4px 20px rgba(0,255,212,0.3)}
.light{background:#1A2E4A;color:#fff;border:1px solid rgba(255,255,255,0.1)}
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">🐾</div>
  <div class="logo">TUCSON PET FINDER</div>
  <div class="sub">Redirecting you now... or choose your version:</div>
  <div class="links">
    <a class="dark" href="tucson-pet-finder.html">🌙 Dark Theme</a>
    <a class="light" href="tucson-pet-finder-v2.html">☀️ Light Theme</a>
  </div>
</div>
</body>
</html>
